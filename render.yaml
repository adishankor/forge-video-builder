services:
  - type: web
    name: forge-video-builder
    runtime: python
    region: oregon
    plan: free                       # upgrade to Starter ($7/mo) for no cold-start

    buildCommand: |
      apt-get update -qq && \
      apt-get install -y -qq ffmpeg espeak-ng && \
      pip install -r requirements.txt

    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 360 --workers 1

    envVars:
      # ── Required ──────────────────────────────────────────────────────────
      - key: FORGE_API_KEY
        value: forge-secret-key-change-me   # ← CHANGE THIS — same value in n8n Variables

      # ── Cloudinary (optional — can also come from n8n payload) ─────────
      - key: CLOUDINARY_CLOUD
        value: dkr7mwz6j
      - key: CLOUDINARY_API_KEY
        value: ""                    # ← fill in from Cloudinary dashboard
      - key: CLOUDINARY_API_SECRET
        value: ""                    # ← fill in from Cloudinary dashboard
      - key: CLOUDINARY_PRESET
        value: flrxrhip

      # ── Flask ─────────────────────────────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"

    healthCheckPath: /health
    autoDeploy: true
