services:
  - type: web
    name: forge-video-builder
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: CLOUDINARY_CLOUD_NAME
        value: YOUR_CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_UPLOAD_PRESET
        value: YOUR_CLOUDINARY_UPLOAD_PRESET
      - key: FORGE_SECRET
        value: make_up_any_secret_here
    buildFilter:
      paths:
        - app.py
        - requirements.txt
